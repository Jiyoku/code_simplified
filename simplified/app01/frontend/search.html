<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索结果 - 知识分享平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <div id="navbar-container"></div>

    <div class="container mt-4">
        <h2 class="mb-4">
            <i class="fas fa-search me-2"></i>搜索结果
        </h2>

        <!-- 搜索框 -->
        <div class="glass-card p-3 mb-4">
            <form onsubmit="handleSearch(event)" class="search-form">
                <div class="input-group">
                    <input type="text" class="form-control" id="searchInput" placeholder="搜索帖子或书籍..." required>
                    <button class="btn btn-primary" type="submit">
                        <i class="fas fa-search me-1"></i>搜索
                    </button>
                </div>
            </form>
        </div>

        <div class="glass-card p-3 mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="ragToggle" checked>
                    <label class="form-check-label" for="ragToggle">
                        <i class="fas fa-robot me-1"></i>
                        使用AI智能搜索
                    </label>
                </div>
             <button class="btn btn-sm btn-outline-info" onclick="showRAGInfo()">
                <i class="fas fa-info-circle me-1"></i>
                什么是AI搜索？
            </button>
            </div>
        </div>

        <!-- 搜索关键词显示 -->
        <div id="searchKeyword" class="mb-3" style="display: none;">
            <p class="text-muted">
                搜索关键词：<strong id="keywordText"></strong>
            </p>
        </div>

        <!-- 结果分类标签 -->
        <ul class="nav nav-tabs mb-4" id="resultTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="posts-tab" data-bs-toggle="tab" data-bs-target="#posts" type="button">
                    <i class="fas fa-newspaper me-1"></i>帖子 <span class="badge bg-primary" id="postCount">0</span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="books-tab" data-bs-toggle="tab" data-bs-target="#books" type="button">
                    <i class="fas fa-book me-1"></i>书籍 <span class="badge bg-success" id="bookCount">0</span>
                </button>
            </li>
        </ul>

        <!-- 搜索结果内容 -->
        <div class="tab-content" id="resultTabContent">
            <!-- 帖子结果 -->
            <div class="tab-pane fade show active" id="posts" role="tabpanel">
                <div id="postsContainer">
                    <!-- 加载指示器 -->
                    <div class="text-center">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">加载中...</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 书籍结果 -->
            <div class="tab-pane fade" id="books" role="tabpanel">
                <div id="booksContainer">
                    <!-- 动态加载 -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/search.js"></script>
    <script src="js/rag_search.js"></script>
</body>
</html>
