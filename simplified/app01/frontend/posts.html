<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帖子广场 - 知识分享平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <div id="navbar-container"></div>

    <div class="container mt-4">
        <!-- 页面标题 -->
        <div class="glass-card p-4 mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="text-primary mb-2">
                        <i class="fas fa-newspaper me-2"></i>帖子广场
                    </h2>
                    <p class="text-muted mb-0">发现更多有趣的知识分享</p>
                </div>
                <a href="create-post.html" class="btn btn-primary" id="createPostBtn" style="display: none;">
                    <i class="fas fa-plus me-2"></i>发布帖子
                </a>
            </div>
        </div>

        <div class="row">
            <!-- 主要内容区域 -->
            <div class="col-lg-9 col-md-8">
                <!-- 排序和筛选 -->
                <div class="glass-card p-3 mb-4">
                    <div class="d-flex flex-wrap align-items-center justify-content-between">
                        <div class="sort-options">
                            <label class="form-label mb-0 me-3">排序方式：</label>
                            <select class="form-select form-select-sm d-inline-block" style="width: auto;" id="sortSelect">
                                <option value="-created_at">最新发布</option>
                                <option value="-views">最多浏览</option>
                                <option value="-likes">最多点赞</option>
                            </select>
                        </div>
                        <div class="post-count">
                            <small class="text-muted">
                                <i class="fas fa-file-alt me-1"></i>
                                共 <span id="postCount">0</span> 篇帖子
                            </small>
                        </div>
                    </div>
                </div>

                <!-- 帖子列表 -->
                <div class="posts-container" id="postsContainer">
                    <!-- 加载指示器 -->
                    <div class="text-center">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">加载中...</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 侧边栏 -->
            <div class="col-lg-3 col-md-4">
                <!-- 热门标签 -->
                <div class="glass-card p-3 mb-4">
                    <h5 class="card-title">
                        <i class="fas fa-fire me-2"></i>热门标签
                    </h5>
                    <div class="hot-tags" id="hotTags">
                        <div class="text-center">
                            <div class="spinner-border spinner-border-sm text-primary" role="status">
                                <span class="visually-hidden">加载中...</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 推荐帖子 -->
                <div class="glass-card p-3 mb-4">
                    <h5 class="card-title">
                        <i class="fas fa-thumbs-up me-2"></i>推荐阅读
                    </h5>
                    <div class="recommended-posts" id="recommendedPosts">
                        <!-- 动态加载 -->
                    </div>
                </div>

                <!-- 快速操作 -->
                <div class="glass-card p-3">
                    <h5 class="card-title">
                        <i class="fas fa-tools me-2"></i>快速操作
                    </h5>
                    <div class="quick-actions">
                        <a href="index.html" class="btn btn-outline-primary btn-sm w-100 mb-2">
                            <i class="fas fa-home me-2"></i>返回首页
                        </a>
                        <a href="my-posts.html" class="btn btn-outline-info btn-sm w-100 mb-2" id="myPostsBtn" style="display: none;">
                            <i class="fas fa-user-edit me-2"></i>我的帖子
                        </a>
                        <a href="create-post.html" class="btn btn-outline-success btn-sm w-100" id="createPostSideBtn" style="display: none;">
                            <i class="fas fa-plus me-2"></i>发布帖子
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/posts.js"></script>
</body>
</html>
