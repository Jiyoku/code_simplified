<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识分享平台 - 首页</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="messageArea"></div>

    <div id="rootLayout">

        <!-- 左侧白色面板 3/10 -->
        <aside id="leftPanel">
            <div id="leftInner">
                <a href="index.html" id="logoLink">
                    <img src="images/logo-new.png" alt="知识分享平台" id="siteLogo"
                         onerror="this.style.display='none';document.getElementById('logoFallback').style.display='block'">
                    <span id="logoFallback" style="display:none;">知识分享平台</span>
                </a>

                <div id="sloganBlock">
                    <h1 id="sloganMain">分享知识</h1>
                    <h1 id="sloganSub">发现世界</h1>
                </div>

                <form id="searchForm" onsubmit="handleSearch(event)">
                    <div id="searchWrap">
                        <i class="fas fa-search" id="searchIco"></i>
                        <input type="text" id="searchInput" placeholder="搜索感兴趣的内容…">
                        <button type="submit" id="searchBtn"><i class="fas fa-arrow-right"></i></button>
                    </div>
                </form>

                <div id="leftDeco">
                    <div class="dline l1"></div>
                    <div class="dline l2"></div>
                    <div class="dline l3"></div>
                </div>
            </div>
        </aside>

        <!-- 右侧画报滚动区 7/10 -->
        <main id="rightScroll">

            <!-- 英雄区 -->
            <section id="heroSection" style="background-image: url('front.jpg');">
                <div id="heroOverlay"></div>
                <div id="heroContent">
                    <div id="heroDate"></div>
                    <blockquote id="heroQuote"></blockquote>
                    <div id="heroQuoteAuthor"></div>
                    <div id="heroActions">
                        <a href="posts.html" class="hero-btn primary">浏览帖子</a>
                        <a href="books.html" class="hero-btn outline">发现书籍</a>
                    </div>
                </div>
            </section>

            <!-- 热门书籍 -->
            <section class="ed-section">
                <div class="ed-head">
                    <span class="ed-eyebrow">BOOKS</span>
                    <h3 class="ed-h3">热门书籍</h3>
                    <a href="books.html" class="ed-link">查看全部 →</a>
                </div>
                <div id="booksGrid" class="books-editorial">
                    <div class="ed-loading"><span class="pulse-dot"></span><span class="pulse-dot"></span><span class="pulse-dot"></span></div>
                </div>
            </section>

            <!-- 推荐帖子 -->
            <section class="ed-section">
                <div class="ed-head">
                    <span class="ed-eyebrow">POSTS</span>
                    <h3 class="ed-h3">推荐帖子</h3>
                    <a href="posts.html" class="ed-link">查看全部 →</a>
                </div>
                <div id="postsGrid" class="posts-editorial">
                    <div class="ed-loading"><span class="pulse-dot"></span><span class="pulse-dot"></span><span class="pulse-dot"></span></div>
                </div>
            </section>

            <!-- 标签索引 -->
            <section class="ed-section" id="tagsSection">
                <div class="ed-head">
                    <span class="ed-eyebrow">INDEX</span>
                    <h3 class="ed-h3">标签索引</h3>
                </div>
                <div id="tagsContainer" class="tags-wall">
                    <div class="ed-loading"><span class="pulse-dot"></span><span class="pulse-dot"></span><span class="pulse-dot"></span></div>
                </div>
            </section>

            <div style="height:5rem;"></div>
        </main>

        <!-- 右侧纵向导航 -->
        <nav id="rightNav">

            <div class="rn-item">
                <a href="index.html" class="rn-btn active">首页</a>
            </div>

            <div class="rn-item has-fly">
                <a href="posts.html" class="rn-btn">帖子</a>
                <div class="fly-panel">
                    <a href="posts.html">全部帖子</a>
                    <a href="create-post.html">分享帖子</a>
                    <a href="my-posts.html">我的帖子</a>
                </div>
            </div>

            <div class="rn-item has-fly">
                <a href="books.html" class="rn-btn">书籍</a>
                <div class="fly-panel">
                    <a href="books.html">全部书籍</a>
                    <a href="create-book.html">分享书籍</a>
                    <a href="my-books.html">我的书籍</a>
                </div>
            </div>

            <div class="rn-item has-fly" id="userNavItem">
                <a href="#" class="rn-btn" id="userNavBtn">账号</a>
                <div class="fly-panel" id="userNavDropdown"></div>
            </div>

        </nav>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
