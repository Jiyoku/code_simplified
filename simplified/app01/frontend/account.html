<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>个人中心 - 知识分享平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="navbar-container"></div>
<div class="container mt-4">

    <!-- 用户信息 -->
    <div class="glass-card p-4 mb-4">
        <div class="row align-items-center">

            <div class="col-md-3 text-center">
                <img id="avatarImg" src="images/default-avatar.png"
                     class="rounded-circle avatar-img mb-2">
            </div>

            <div class="col-md-9">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">用户名</label>
                        <input class="form-control" id="username" readonly>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">邮箱</label>
                        <input class="form-control" id="email">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">名字</label>
                        <input class="form-control" id="firstName">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">姓氏</label>
                        <input class="form-control" id="lastName">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">个人简介</label>
                    <textarea class="form-control" id="bio" rows="2"></textarea>
                </div>

                <button class="btn btn-primary" id="saveProfileBtn">
                    <i class="fas fa-save me-1"></i>保存更改
                </button>
            </div>
        </div>
    </div>

    <!-- 我的帖子 -->
    <div class="glass-card p-4 mb-4">
        <h4><i class="fas fa-file-alt me-2"></i>我的帖子</h4>
        <div id="myPostsContainer"></div>
    </div>

    <!-- 我的书籍 -->
    <div class="glass-card p-4">
        <h4><i class="fas fa-book me-2"></i>我的书籍</h4>
        <div class="row">
            <div class="col-md-6">
                <h6 class="text-muted">我添加的书籍</h6>
                <div id="myBooksContainer"></div>
            </div>
            <div class="col-md-6">
                <h6 class="text-muted">我在售的书籍</h6>
                <div id="mySalesContainer"></div>
            </div>
        </div>
    </div>

</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/components.js"></script>
<script src="js/account.js"></script>
</body>
</html>
