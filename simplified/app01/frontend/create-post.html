<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布帖子 - 知识分享平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <div id="navbar-container"></div>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <div class="glass-card p-4">
                    <div class="text-center mb-4">
                        <h2 class="text-primary">
                            <i class="fas fa-edit me-2"></i>发布新帖子
                        </h2>
                        <p class="text-muted">分享你的知识见解，让更多人受益</p>
                    </div>

                    <!-- 消息区域 -->
                    <div id="messageArea"></div>

                    <form id="createPostForm" class="needs-validation" novalidate>
                        <!-- 标题输入 -->
                        <div class="mb-4">
                            <label for="title" class="form-label fw-bold">
                                <i class="fas fa-heading me-2"></i>标题
                            </label>
                            <input type="text" class="form-control" id="title" placeholder="请输入帖子标题" required>
                        </div>

                        <!-- 内容输入 -->
                        <div class="mb-4">
                            <label for="content" class="form-label fw-bold">
                                <i class="fas fa-align-left me-2"></i>内容
                            </label>
                            <textarea class="form-control" id="content" rows="8" placeholder="分享你的知识和见解..." required></textarea>
                        </div>

                        <!-- 标签输入 -->
                        <div class="mb-4">
                            <label for="tags" class="form-label fw-bold">
                                <i class="fas fa-tags me-2"></i>标签
                            </label>
                            <input type="text" class="form-control" id="tags" placeholder="输入标签，用逗号分隔">
                            <div class="form-text">多个标签用逗号分隔，例如：技术分享,编程教程</div>
                            <!-- 标签预览 -->
                            <div id="tagPreview" class="mt-2"></div>
                        </div>

                        <!-- 推荐书籍输入 (可选) -->
                        <div class="mb-4">
                            <label for="books" class="form-label fw-bold">
                                <i class="fas fa-book me-2"></i>推荐书籍（可选）
                            </label>
                            <input type="text" class="form-control" id="books" placeholder="例如：《Python编程》-作者名，《算法导论》-作者名">
                            <div class="form-text">输入书名和作者，格式：《书名》-作者，多本书用逗号分隔</div>
                        </div>

                        <!-- 提交按钮 -->
                        <div class="d-flex justify-content-between align-items-center">
                            <a href="index.html" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left me-2"></i>返回首页
                            </a>
                            <div>
                                <button type="button" class="btn btn-outline-primary me-2" onclick="previewPost()">
                                    <i class="fas fa-eye me-2"></i>预览
                                </button>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-paper-plane me-2"></i>发布帖子
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- 预览模态框 -->
    <div class="modal fade" id="previewModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-eye me-2"></i>帖子预览
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="previewContent">
                        <h3 id="previewTitle" class="mb-3"></h3>
                        <div id="previewTags" class="mb-3"></div>
                        <div id="previewText" style="white-space: pre-wrap;"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="fas fa-times me-2"></i>关闭
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/create-post.js"></script>
</body>
</html>
