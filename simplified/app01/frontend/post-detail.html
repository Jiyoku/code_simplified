<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帖子详情 - 知识分享平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <div id="navbar-container"></div>

    <div class="container mt-4">
        <!-- 消息区域 -->
        <div id="messageArea"></div>

        <div class="row">
            <!-- 主要内容区域 -->
            <div class="col-lg-8 col-md-12">
                <div class="glass-card p-4 mb-4" id="postDetailContainer">
                    <!-- 加载指示器 -->
                    <div class="text-center">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">加载中...</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 侧边栏 -->
            <div class="col-lg-4 col-md-12">
                <!-- 作者信息卡片 -->
                <div class="glass-card p-3 mb-4" id="authorCard" style="display: none;">
                    <h5 class="card-title">
                        <i class="fas fa-user-circle me-2"></i>作者信息
                    </h5>
                    <div class="author-card text-center" id="authorInfo">
                        <!-- 动态加载 -->
                    </div>
                </div>

                <!-- 相关标签 -->
                <div class="glass-card p-3 mb-4" id="tagsCard" style="display: none;">
                    <h5 class="card-title">
                        <i class="fas fa-tags me-2"></i>相关标签
                    </h5>
                    <div class="related-tags" id="relatedTags">
                        <!-- 动态加载 -->
                    </div>
                </div>

                <!-- 快速导航 -->
                <div class="glass-card p-3">
                    <h5 class="card-title">
                        <i class="fas fa-compass me-2"></i>快速导航
                    </h5>
                    <div class="quick-nav">
                        <a href="posts.html" class="btn btn-outline-primary btn-sm w-100 mb-2">
                            <i class="fas fa-list me-2"></i>所有帖子
                        </a>
                        <a href="create-post.html" class="btn btn-outline-success btn-sm w-100 mb-2" id="createPostBtn" style="display: none;">
                            <i class="fas fa-plus me-2"></i>发布帖子
                        </a>
                        <a href="my-posts.html" class="btn btn-outline-info btn-sm w-100" id="myPostsBtn" style="display: none;">
                            <i class="fas fa-user-edit me-2"></i>我的帖子
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/post-detail.js"></script>
</body>
</html>
