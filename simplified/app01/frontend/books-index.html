<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书籍推荐 - 知识分享平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <div id="navbar-container"></div>

    <div class="container mt-4">
        <!-- 页面标题 -->
        <div class="glass-card p-4 mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="text-primary mb-2">
                        <i class="fas fa-book me-2"></i>书籍推荐
                    </h2>
                    <p class="text-muted mb-0">发现优质书籍，分享阅读体验</p>
                </div>
                <a href="create-book.html" class="btn btn-primary" id="addBookBtn" style="display: none;">
                    <i class="fas fa-plus me-2"></i>添加书籍
                </a>
            </div>
        </div>

        <!-- 热门书籍 -->
        <div class="glass-card p-4 mb-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 style="color: #333; font-weight: 600;">
                    <i class="fas fa-fire me-2"></i>热门书籍
                </h3>
                <a href="books.html" class="btn btn-outline-primary btn-sm">
                    查看更多 <i class="fas fa-arrow-right ms-1"></i>
                </a>
            </div>
            
            <div class="row" id="popularBooksContainer">
                <!-- 加载指示器 -->
                <div class="col-12 text-center">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">加载中...</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 最新书籍 -->
        <div class="glass-card p-4">
            <h3 class="mb-4" style="color: #333; font-weight: 600;">
                <i class="fas fa-clock me-2"></i>最新添加
            </h3>
            
            <div class="row" id="latestBooksContainer">
                <!-- 加载指示器 -->
                <div class="col-12 text-center">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">加载中...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/books-index.js"></script>
</body>
</html>
