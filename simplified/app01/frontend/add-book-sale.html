<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出售书籍 - 知识分享平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <div id="navbar-container"></div>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <!-- 书籍信息卡片 -->
                <div class="glass-card p-4 mb-4" id="bookInfoCard">
                    <div class="text-center">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">加载中...</span>
                        </div>
                    </div>
                </div>

                <!-- 出售信息表单 -->
                <div class="glass-card p-4">
                    <div class="text-center mb-4">
                        <h2 class="text-primary">
                            <i class="fas fa-store me-2"></i>发布出售信息
                        </h2>
                        <p class="text-muted">填写你的书籍出售信息</p>
                    </div>

                    <!-- 消息区域 -->
                    <div id="messageArea"></div>

                    <form id="saleForm" onsubmit="handleCreateSale(event)" class="sale-form">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="price" class="form-label">出售价格 (元) *</label>
                                <input type="number" class="form-control" id="price" step="0.01" min="0.01" required>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="condition" class="form-label">新旧程度 *</label>
                                <select class="form-select" id="condition" required>
                                    <option value="">请选择</option>
                                    <option value="new">全新</option>
                                    <option value="good">九成新</option>
                                    <option value="fair">八成新</option>
                                    <option value="poor">七成新以下</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="contact_info" class="form-label">联系方式 *</label>
                            <input type="text" class="form-control" id="contact_info" required>
                            <div class="form-text">请填写QQ、微信、邮箱等联系方式，方便买家联系</div>
                        </div>

                        <div class="mb-4">
                            <label for="notes" class="form-label">备注说明</label>
                            <textarea class="form-control" id="notes" rows="4"></textarea>
                            <div class="form-text">可以描述书籍的具体状况、交易方式等</div>
                        </div>

                        <!-- 提交按钮 -->
                        <div class="text-center">
                            <button type="submit" class="btn btn-primary btn-lg me-3">
                                <i class="fas fa-save me-2"></i>发布出售信息
                            </button>
                            <button type="button" class="btn btn-outline-secondary btn-lg" onclick="goBack()">
                                <i class="fas fa-times me-2"></i>取消
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/add-book-sale.js"></script>
</body>
</html>
