<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的书籍 - 知识分享平台</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="navbar-container"></div>
<div class="container mt-4">

    <div class="glass-card p-4 mb-4 d-flex justify-content-between align-items-center">
        <h2 class="text-primary mb-0">
            <i class="fas fa-bookmark me-2"></i>我的书籍
        </h2>
        <a href="create-book.html" class="btn btn-primary">
            <i class="fas fa-plus me-2"></i>添加书籍
        </a>
    </div>

    <div class="row">
        <!-- 我添加的书籍 -->
        <div class="col-lg-6 mb-4">
            <div class="glass-card p-4">
                <h4 class="mb-4">
                    <i class="fas fa-book me-2"></i>我添加的书籍
                    <span class="badge bg-primary ms-2" id="createdCount">0</span>
                </h4>
                <div id="createdBooks"></div>
            </div>
        </div>

        <!-- 我在售的书籍 -->
        <div class="col-lg-6 mb-4">
            <div class="glass-card p-4">
                <h4 class="mb-4">
                    <i class="fas fa-store me-2"></i>我在售的书籍
                    <span class="badge bg-success ms-2" id="sellingCount">0</span>
                </h4>
                <div id="sellingBooks"></div>
            </div>
        </div>
    </div>

</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/components.js"></script>
<script src="js/my-books.js"></script>

</body>
</html>
