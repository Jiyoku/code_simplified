server {
    listen 80;
    server_name localhost;   # ① 没域名就用 localhost

    # ② 前端根目录（不是 dist！）
    root /Users/akaishuichi/DjangoProject-1/app01/frontend;
    index index.html;

    # API → Django
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Admin → Django
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
    }

    # ③ media（用户上传）
    location /media/ {
        alias /Users/akaishuichi/DjangoProject-1/app01/media/;
    }

    # ④ static（Django collectstatic）
    location /static/ {
        alias /Users/akaishuichi/DjangoProject-1/app01/static/;
    }

    # 前端页面
    location / {
        try_files $uri $uri/ /index.html;
    }
}
