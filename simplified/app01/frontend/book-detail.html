<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书籍详情 - 知识分享平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <div id="navbar-container"></div>

    <div class="container mt-4">
        <!-- 消息区域 -->
        <div id="messageArea"></div>

        <div class="row">
            <!-- 书籍信息 -->
            <div class="col-lg-8 col-md-12">
                <div class="glass-card p-4 mb-4" id="bookInfoContainer">
                    <!-- 加载指示器 -->
                    <div class="text-center">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">加载中...</span>
                        </div>
                    </div>
                </div>

                <!-- 出售信息 -->
                <div class="glass-card p-4 mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4><i class="fas fa-store me-2"></i>在售信息</h4>
                        <button class="btn btn-primary" id="addSaleBtn" onclick="addSale()" style="display: none;">
                            <i class="fas fa-plus me-1"></i>我要出售
                        </button>
                    </div>
                    
                    <div id="salesContainer">
                        <!-- 动态加载出售信息 -->
                        <div class="text-center">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">加载中...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 侧边栏 -->
            <div class="col-lg-4 col-md-12">
                <!-- 推荐该书的帖子 -->
                <div class="glass-card p-3 mb-4" id="recommendingPostsCard" style="display: none;">
                    <h5 class="card-title">
                        <i class="fas fa-heart me-2"></i>相关推荐帖子
                    </h5>
                    <div id="recommendingPostsContainer">
                        <!-- 动态加载 -->
                    </div>
                </div>

                <!-- 快速导航 -->
                <div class="glass-card p-3">
                    <h5 class="card-title">
                        <i class="fas fa-compass me-2"></i>快速导航
                    </h5>
                    <div class="quick-nav">
                        <a href="books.html" class="btn btn-outline-primary btn-sm w-100 mb-2">
                            <i class="fas fa-book me-2"></i>所有书籍
                        </a>
                        <a href="create-book.html" class="btn btn-outline-success btn-sm w-100 mb-2" id="createBookBtn" style="display: none;">
                            <i class="fas fa-plus me-2"></i>添加书籍
                        </a>
                        <a href="my-books.html" class="btn btn-outline-info btn-sm w-100" id="myBooksBtn" style="display: none;">
                            <i class="fas fa-bookmark me-2"></i>我的书籍
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/book-detail.js"></script>
</body>
</html>
