<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>所有书籍 - 知识分享平台</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-container"></div>

<div class="container mt-4">

    <!-- 页面标题 -->
    <div class="glass-card p-4 mb-4 d-flex justify-content-between align-items-center">
        <div>
            <h2 class="text-primary mb-2">
                <i class="fas fa-books me-2"></i>所有书籍
            </h2>
            <p class="text-muted mb-0">浏览所有书籍资源</p>
        </div>
        <a href="create-book.html" class="btn btn-primary" id="addBookBtn" style="display:none;">
            <i class="fas fa-plus me-2"></i>添加书籍
        </a>
    </div>

    <div class="row g-4">

        <!-- 主内容 -->
        <div class="col-lg-9 col-md-8">
            <!-- 卡片列表由 books.js 渲染到这里 -->
            <div id="booksContainer">
                <div class="text-center p-5">
                    <div class="spinner-border text-primary"></div>
                </div>
            </div>
            <!-- 分页由 books.js 动态插入到 booksContainer 后面 -->
        </div>

        <!-- 侧边栏 -->
        <div class="col-lg-3 col-md-4">
            <div class="glass-card p-3 mb-4">
                <h5><i class="fas fa-tools me-2"></i>快速操作</h5>
                <a href="books.html" class="btn btn-outline-primary btn-sm w-100 mb-2">
                    <i class="fas fa-home me-2"></i>书籍首页
                </a>
                <a href="my-books.html" class="btn btn-outline-info btn-sm w-100 mb-2 auth-only" style="display:none;">
                    <i class="fas fa-bookmark me-2"></i>我的书籍
                </a>
                <a href="create-book.html" class="btn btn-outline-success btn-sm w-100 auth-only" style="display:none;">
                    <i class="fas fa-plus me-2"></i>添加书籍
                </a>
            </div>

            <div class="glass-card p-3">
                <h5><i class="fas fa-chart-bar me-2"></i>统计信息</h5>
                <div class="d-flex justify-content-between">
                    <span>总书籍数</span>
                    <span class="fw-bold" id="bookCount">—</span>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/components.js"></script>
<script src="js/books.js"></script>
</body>
</html>
