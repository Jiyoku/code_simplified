<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>标签页 - 知识分享平台</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-container"></div>

<div class="container mt-4">

    <!-- 标签信息头部 -->
    <div class="glass-card p-4 mb-4">
        <div class="row align-items-center">
            <div class="col-md-8">
                <div class="tag-header">
                    <h2 class="text-primary mb-2">
                        <i class="fas fa-tag me-2"></i>
                        <span id="tagName"></span>
                    </h2>
                    <p class="text-muted mb-3">
                        探索与 <strong id="tagNameStrong"></strong> 相关的所有内容
                    </p>
                    <div class="tag-stats">
                        <span class="stat-badge me-3">
                            <i class="fas fa-file-alt me-1"></i>
                            <span id="postCount">0</span> 篇帖子
                        </span>
                    </div>
                </div>
            </div>

            <div class="col-md-4 text-md-end">
                <div class="tag-badge-large">
                    <i class="fas fa-hashtag me-2"></i>
                    <span id="tagBadge"></span>
                </div>
                <a href="create-post.html" class="btn btn-primary mt-3" id="createPostBtn" style="display:none">
                    <i class="fas fa-plus me-2"></i>发布相关帖子
                </a>
            </div>
        </div>
    </div>

    <div class="row">

        <!-- 主内容 -->
        <div class="col-lg-9 col-md-8">

            <!-- 排序 -->
            <div class="glass-card p-3 mb-4">
                <div class="d-flex justify-content-between align-items-center">
                    <div class="sort-options">
                        <label class="form-label mb-0 me-3">排序方式：</label>
                        <select class="form-select form-select-sm d-inline-block" style="width:auto"
                                onchange="sortPosts(this.value)">
                            <option value="-created_at">最新发布</option>
                            <option value="-views">最多浏览</option>
                            <option value="-likes">最多点赞</option>
                        </select>
                    </div>

                    <div class="view-options">
                        <div class="btn-group btn-group-sm">
                            <button class="btn btn-outline-primary active" onclick="setView('list', this)">
                                <i class="fas fa-list"></i>
                            </button>
                            <button class="btn btn-outline-primary" onclick="setView('grid', this)">
                                <i class="fas fa-th"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 帖子容器 -->
            <div id="postsContainer"></div>
        </div>

        <!-- 侧边栏 -->
        <div class="col-lg-3 col-md-4">

            <div class="glass-card p-3 mb-4">
                <h5 class="card-title">
                    <i class="fas fa-info-circle me-2"></i>标签信息
                </h5>
                <div class="tag-info">
                    <div class="info-item mb-2">
                        <span class="info-label">标签名称：</span>
                        <span class="info-value" id="tagInfoName"></span>
                    </div>
                    <div class="info-item mb-2">
                        <span class="info-label">帖子数量：</span>
                        <span class="info-value" id="tagInfoCount"></span>
                    </div>
                </div>
            </div>

            <div class="glass-card p-3">
                <h5 class="card-title">
                    <i class="fas fa-compass me-2"></i>快速导航
                </h5>
                <div class="quick-nav">
                    <a href="index.html" class="btn btn-outline-primary btn-sm w-100 mb-2">
                        <i class="fas fa-home me-2"></i>返回首页
                    </a>
                    <a href="posts.html" class="btn btn-outline-info btn-sm w-100 mb-2">
                        <i class="fas fa-list me-2"></i>所有帖子
                    </a>
                    <a href="create-post.html" class="btn btn-outline-success btn-sm w-100" id="sidebarCreatePost"
                       style="display:none">
                        <i class="fas fa-plus me-2"></i>发布帖子
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/components.js"></script>
<script src="js/tag-posts.js"></script>

</body>
</html>
