<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>添加书籍 - 知识分享平台</title>

   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="navbar-container"></div>
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
            <div class="glass-card p-4">

                <div class="text-center mb-4">
                    <h2 class="text-primary">
                        <i class="fas fa-book me-2"></i>添加书籍
                    </h2>
                    <p class="text-muted">分享一本好书，让更多人发现它</p>
                </div>

                <form id="bookForm" class="book-form">

                    <!-- 基本信息 -->
                    <div class="form-section mb-4">
                        <h5 class="section-title">
                            <i class="fas fa-info-circle me-2"></i>基本信息
                        </h5>

                        <div class="row">
                            <div class="col-md-8 mb-3">
                                <label class="form-label">书名 *</label>
                                <input id="title" class="form-control" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">作者 *</label>
                                <input id="author" class="form-control" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">出版社</label>
                                <input id="publisher" class="form-control">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">出版日期</label>
                                <input id="publish_date" type="date" class="form-control">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">ISBN</label>
                            <input id="isbn" class="form-control">
                        </div>
                    </div>

                    <!-- 详细信息 -->
                    <div class="form-section mb-4">
                        <h5 class="section-title">
                            <i class="fas fa-align-left me-2"></i>详细信息
                        </h5>

                        <div class="mb-3">
                            <label class="form-label">书籍简介</label>
                            <textarea id="description" class="form-control" rows="4"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">封面图片链接</label>
                            <input id="cover_image" class="form-control">
                        </div>
                    </div>

                    <div class="text-center">
                        <button class="btn btn-primary btn-lg me-3" type="submit">
                            <i class="fas fa-save me-2"></i>添加书籍
                        </button>
                        <a href="books.html" class="btn btn-outline-secondary btn-lg">
                            取消
                        </a>
                    </div>

                </form>

            </div>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/components.js"></script>
<script src="js/create-book.js"></script>

</body>
</html>
