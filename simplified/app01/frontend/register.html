<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 知识分享平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <div id="navbar-container"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="glass-card">
                    <div class="card-header text-center p-3">
                        <h3 class="text-primary">
                            <i class="fas fa-user-plus me-2"></i>用户注册
                        </h3>
                    </div>
                    <div class="card-body p-4">
                        <!-- 消息区域 -->
                        <div id="messageArea"></div>

                        <form id="registerForm" onsubmit="handleRegister(event)">
                            <div class="mb-3">
                                <label for="username" class="form-label">
                                    <i class="fas fa-user me-1"></i>用户名
                                </label>
                                <input type="text" class="form-control" id="username" required>
                                <div class="form-text">用户名长度为3-150个字符</div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">
                                    <i class="fas fa-envelope me-1"></i>邮箱
                                </label>
                                <input type="email" class="form-control" id="email" required>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">
                                    <i class="fas fa-lock me-1"></i>密码
                                </label>
                                <input type="password" class="form-control" id="password" required>
                                <div class="form-text">密码至少8个字符，不能全是数字</div>
                            </div>

                            <div class="mb-3">
                                <label for="password2" class="form-label">
                                    <i class="fas fa-lock me-1"></i>确认密码
                                </label>
                                <input type="password" class="form-control" id="password2" required>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-user-plus me-2"></i>注册
                                </button>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer text-center p-3">
                        <p class="mb-0">已有账号？<a href="login.html" class="text-primary">立即登录</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
